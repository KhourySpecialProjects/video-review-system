$kind: http-request
name: GET upload status
description: |-
  Get upload progress for resuming a multipart upload.
  Returns { video, uploadedParts, remainingParts, bytesUploaded, partSize, totalParts, expiresIn }.
  409 if video status is not UPLOADING.
method: GET
url: '{{baseUrl}}/domain/videos/{{videoId}}/upload-status'
order: 6000
headers:
  - key: Content-Type
    value: application/json
  - key: Cookie
    value: '{{sessionCookie}}'
