$kind: http-request
name: POST cancel upload
description: |-
  Abort an in-progress multipart upload. Returns 204 No Content.
  409 if video status is not UPLOADING.
method: POST
url: '{{baseUrl}}/domain/videos/{{videoId}}/cancel-upload'
order: 9000
headers:
  - key: Content-Type
    value: application/json
  - key: Cookie
    value: '{{sessionCookie}}'
